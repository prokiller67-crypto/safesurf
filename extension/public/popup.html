<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: -apple-system, "Segoe UI", Arial, sans-serif;
      width: 340px;
      margin: 0;
      padding: 18px;
      background: #0f172a;
      color: #e2e8f0;
    }
    h1 { font-size: 18px; margin: 0 0 4px; }
    .tagline { font-size: 12px; color: #94a3b8; margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 4px; }
    input[type="password"], input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 13px;
    }
    .row { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
    .row label { margin: 0; }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #16a34a;
      color: white;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #15803d; }
    #status { font-size: 12px; color: #4ade80; margin-top: 8px; text-align: center; min-height: 14px; }
    .hint { font-size: 11px; color: #64748b; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>🛡️ SafeSurf</h1>
  <div class="tagline">AI scam shield for the people you love</div>

  <div class="row" style="margin-top:0">
    <input type="checkbox" id="aiEnabled" />
    <label for="aiEnabled">AI analysis (SafeSurf Cloud — no setup needed)</label>
  </div>

  <label for="apiKey">Your own Anthropic API key <span style="font-weight:400;color:#64748b">(optional)</span></label>
  <input type="password" id="apiKey" placeholder="sk-ant-... (leave empty to use SafeSurf Cloud)" />
  <div class="hint">If set, analysis runs with your key directly — it never leaves your browser.</div>

  <button id="save">Save</button>
  <div id="status"></div>

  <script src="popup.js" type="module"></script>
</body>
</html>
